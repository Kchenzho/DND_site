<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Compendio D&amp;D 5e</title>
<link rel="stylesheet" href="./css/compendio_dnd_5e.css">
</head>
<body>

<div class="header">
  <span class="rune">&#9876;</span>
  <div class="header-title">COMPENDIO 5e</div>
  <span class="rune">&#128218;</span>
</div>

<div class="tabs" id="tabs">
  <div class="tab active" data-tab="monsters">Bestiario (738)</div>
  <div class="tab" data-tab="spells">Hechizos (531)</div>
  <div class="tab" data-tab="items">Objetos (1709)</div>
  <div class="tab" data-tab="races">Razas (103)</div>
  <div class="tab" data-tab="classes">Clases (19)</div>
  <div class="tab" data-tab="backgrounds">Trasfondos (62)</div>
  <div class="tab" data-tab="feats">Dotes (71)</div>
</div>

<div class="container">

  <div class="tab-panel active" id="panel-monsters">
    <div class="search-box"><span class="search-icon">&#128269;</span><input class="search-input" id="search-monsters" placeholder="Buscar monstruo... (ej: dragon, goblin, lich)"></div>
    <div class="filters">
      <select class="filter-select" id="filter-cr"><option value="">Todos los CR</option></select>
      <select class="filter-select" id="filter-type"><option value="">Todos los tipos</option></select>
    </div>
    <div class="result-count" id="count-monsters"></div>
    <div id="list-monsters"></div>
  </div>

  <div class="tab-panel" id="panel-spells">
    <div class="search-box"><span class="search-icon">&#128269;</span><input class="search-input" id="search-spells" placeholder="Buscar hechizo... (ej: fireball, cure wounds)"></div>
    <div class="filters">
      <select class="filter-select" id="filter-level"><option value="">Todos los niveles</option></select>
      <select class="filter-select" id="filter-school"><option value="">Toda escuela</option></select>
    </div>
    <div class="result-count" id="count-spells"></div>
    <div id="list-spells"></div>
  </div>

  <div class="tab-panel" id="panel-items">
    <div class="search-box"><span class="search-icon">&#128269;</span><input class="search-input" id="search-items" placeholder="Buscar objeto... (ej: sword, potion, ring)"></div>
    <div class="filters">
      <select class="filter-select" id="filter-rarity"><option value="">Toda rareza</option></select>
      <select class="filter-select" id="filter-magic"><option value="">Mágico y no mágico</option><option value="YES">Solo mágicos</option></select>
    </div>
    <div class="result-count" id="count-items"></div>
    <div id="list-items"></div>
  </div>

  <div class="tab-panel" id="panel-races">
    <div class="search-box"><span class="search-icon">&#128269;</span><input class="search-input" id="search-races" placeholder="Buscar raza..."></div>
    <div class="result-count" id="count-races"></div>
    <div id="list-races"></div>
  </div>

  <div class="tab-panel" id="panel-classes">
    <div class="search-box"><span class="search-icon">&#128269;</span><input class="search-input" id="search-classes" placeholder="Buscar clase..."></div>
    <div class="result-count" id="count-classes"></div>
    <div id="list-classes"></div>
  </div>

  <div class="tab-panel" id="panel-backgrounds">
    <div class="search-box"><span class="search-icon">&#128269;</span><input class="search-input" id="search-backgrounds" placeholder="Buscar trasfondo..."></div>
    <div class="result-count" id="count-backgrounds"></div>
    <div id="list-backgrounds"></div>
  </div>

  <div class="tab-panel" id="panel-feats">
    <div class="search-box"><span class="search-icon">&#128269;</span><input class="search-input" id="search-feats" placeholder="Buscar dote..."></div>
    <div class="result-count" id="count-feats"></div>
    <div id="list-feats"></div>
  </div>

</div>

<script src="./js/compendio_gm.js"></script>
</body>
</html>

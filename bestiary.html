<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bestiario — D&D 5e</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="./css/bestiary.css">
</head>
<body>

<header class="site-header">
  <div class="site-title">
    ⚔ Bestiario Completo
    <span>D&amp;D 5e · 738 Criaturas</span>
  </div>
  <div style="display:flex;gap:8px">
    <button class="dossier-btn" onclick="window.close()" style="font-size:11px">← Volver al DM Screen</button>
  </div>
</header>

<div class="layout">
  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="sidebar-filters">
      <input class="search-input" id="srch" placeholder="🔍 Buscar criatura..." oninput="filterMonsters()">
      <div class="filter-row">
        <select class="filter-sel" id="flt-cr" onchange="filterMonsters()">
          <option value="">Todos CR</option>
        </select>
        <select class="filter-sel" id="flt-type" onchange="filterMonsters()">
          <option value="">Todos tipos</option>
        </select>
        <select class="filter-sel" id="flt-size" onchange="filterMonsters()">
          <option value="">Tamaño</option>
        </select>
        <select class="filter-sel" id="flt-env" onchange="filterMonsters()">
          <option value="">Entorno</option>
        </select>
      </div>
      <div class="monster-count" id="count-label">738 criaturas</div>
    </div>
    <div class="monster-list" id="monster-list"></div>
  </aside>

  <!-- DOSSIER -->
  <main class="dossier" id="dossier">
    <div class="dossier-empty">
      <div class="big-icon">🐉</div>
      <p>Selecciona una criatura del bestiario</p>
      <p style="font-size:13px;margin-top:8px;color:var(--cream-m)">Haz click en cualquier entrada de la lista</p>
    </div>
  </main>
</div>

<script src="./js/bestiary.js"></script>
</body>
</html>
